# Generated by Cliara for pre-push secret scanning.
# Add  # cliara-noscan  to a line to acknowledge a known-safe value.
# Disable: config set secret_scan_on_push false
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - "--exclude-lines"
          - "cliara-noscan"
        exclude: |
          (?x)^(
            .*\.lock$|
            .*\.min\.js$|
            .*\.svg$|
            .*\.png$|
            .*\.jpg$|
            .*\.jpeg$|
            .*\.ico$
          )$
